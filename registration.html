<!DOCTYPE html>
<html>
<head>
    <title>Registration - BOM</title>
            <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- Latest compiled JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body style="background-color: #ffcccc;">
    <!--header-->
<div class="col-md-12 col-sm-12" style="background-color: rgb(15, 10, 41); padding: 10px; color: white;">

    <div class="col-md-6 col-sm-12">
        <img src="https://www.shutterstock.com/image-vector/bank-icon-logo-vector-260nw-399995245.jpg" alt="Logo" style="width: 50px; height: 50px; vertical-align: middle; display: inline-block;">
        <h2 style="display: inline-block; vertical-align: middle; margin-left: 10px;">BANK OF MYSORE (BOM)</h2>
    </div>

    <div class="col-md-6 col-sm-12 text-right" style="margin-top: 15px;">
        <a href="welcome.html" class="btn btn-primary">Home</a>
    </div>

</div>
 <!--main content-->
    <div class="container">
        <div class="row">
            <div class="col-md-12 col-sm-12 text-center" 
                 style="background-color: rgb(15, 10, 41); color:  hwb(0 80% 0%); padding: 40px; margin-top: 50px; border-radius: 8px 8px 0 0;">
                <h1 style="margin: 0; letter-spacing: 2px;">SIGN IN</h1>
            </div>
            <div class="col-md-12 col-sm-12 text-center" 
                 style="background-color: #ffcccc; padding: 40px; border: 1px solid  #ffcccc; border-top: none; border-radius: 0 0 8px 8px;">
                <p>Please enter your credentials.</p>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" id="usn"placeholder="Username">
                    </div>
                  <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" id="eml" placeholder="Email">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" class="form-control" id="phn"  placeholder="Phone Number">
                    </div>
                <div class="form-group">
                        <label>Address</label>
                        <input type="text" class="form-control" id="add" placeholder="Address">
                    </div>
                                        <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="pwd" placeholder="Password">
                </div>
                    <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" class="form-control" id="confirmPwd" placeholder="Confirm Password">
            </div>
                 <div class="col-md-12 col-sm-12 text-center" 
             style="background-color: #ffcccc; padding: 40px; border: 1px solid  #ffcccc; border-top: none; border-radius: 0 0 8px 8px;">
           <button type="button" class="btn btn-primary" onclick="handleLogin()" style="background: rgba(0,0,0,0.5); padding: 10px 20px;">
                Continue
</button>
            <a href="welcome.html" button type="button" class="btn btn-primary" style="background: rgba(0,0,0,0.5); padding: 10px 20px;">Back to Home</a>
        </div>

<!--footer-->
<div class="col-md-12 text-center" 
     style="background-color: rgb(15, 10, 41); color: white; padding: 15px; position: fixed; bottom: 0; left: 0; width: 100%;">
    <h4 style="margin: 0;">&copy; 2026 BANK OF MYSORE (BOM)</h4>
</div>
</body>
<script>
    function handleLogin() {
        if (validation()) {
            window.location.href = "loginpage.html";
        }
    }

    function validation() {
        var usn = document.getElementById("usn").value;
        var usnexp = /^[A-Za-z ]{5,20}$/;
        if (!usnexp.test(usn)) {
            alert("Invalid username! (5-20 letters/spaces only)");
            return false;
        }

        var pwd = document.getElementById("pwd").value;
        var pwdexp = /^(?=.*[A-Z]+)(?=.*[a-z]+)(?=.*[0-9]+)(?=.*[!#@_\/$&]+)[A-Za-z0-9!#@_\/$&]{8,32}$/;
        if (!pwdexp.test(pwd)) {
            alert("Password must be 8-32 characters with at least one uppercase letter, one lowercase letter, one number, and one special character.");
            return false;
        }

        var eml = document.getElementById("eml").value;
        var emlexp = /^[a-z0-9$#!-\/]+@[a-z0-9.-]+\.[a-z]{2,4}$/;
        if (!emlexp.test(eml)) {
            alert("Invalid email! (Must be in format:   ");
            return false;
        }

        var phn = document.getElementById("phn").value;
        var phnexp =/^[6-9]{1}[0-9]{9}$/;
        if (!phnexp.test(phn)) {
            alert("Invalid phone number! (Must be 10 digits)");
            return false;
        }

        var add = document.getElementById("add").value;
        var addexp = /^[a-zA-Z0-9\s,.-]{5,50}$/;
        if (!addexp.test(add)) {
            alert("Invalid address! (5-50 characters)");
            return false;
        }
        var pwd = document.getElementById("pwd").value; 
        var confirmPwd = document.getElementById("confirmPwd").value;
        if (confirmPwd != pwd) {
            alert("Passwords do not match!");
            return false;
        }
        alert("Account registered successfully!");
        return true;
  }

</script>
</html>
