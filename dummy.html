<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Redirect</title>
                    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- Latest compiled JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .redirect-container {
            background: white;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
        }
        .redirect-container h1 {
            color: #333;
            margin-bottom: 1.5rem;
        }
        .redirect-container p {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .spinner-border {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <h1>Redirecting to Bank</h1>
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p>Please wait while we redirect you to the bank page...</p>
        <a href="https://www.bankofamerica.com" class="btn btn-primary mt-3">Click here if not redirected</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Redirect to bank after 2 seconds
        setTimeout(function() {
            window.location.href = "https://www.bankofamerica.com";
        }, 2000);
    </script>
</body>
</html>
